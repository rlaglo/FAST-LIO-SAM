basic:
  map_frame: "map"                          # publish frame
  loop_update_hz: 1.0                       # 2 Loop detection Hz
  vis_hz: 1.0                               # visualize Hz

keyframe:
  keyframe_threshold: 2.5                   # 1.5 unit [meter] every this distance, generate keyframe
  num_submap_keyframes: 5                   # how many subkeyframes are merged to ICP with current keyframe (closest-this ~ closest+this, if exists)

loop:
  loop_detection_radius: 20.0               # 35 unit [meter] within this radius, check if loop or not
  loop_detection_timediff_threshold: 35.0   # 30 unit [sec] check if two keyframes are loop if times are farther than this

icp:
  icp_voxel_resolution: 0.3                 # unit [meter] for ICP
  icp_score_threshold: 4                # lower is more accurate, for loop detection

result:
  save_voxel_resolution: 0.3                # voxel resolution to save map in .pcd format and visualize in rviz
  save_max_points: 9000000                  # max number of points to keep when saving map .pcd
  save_map_pcd: true                        # Save result map in .pcd format, not voxelized and hence file size could be huge
  save_map_bag: true                        # Save result map in .bag format, NOTE: this is used for FAST-LIO-Localization-QN (https://github.com/engcang/FAST-LIO-Localization-QN)
  save_in_kitti_format: true                # Save result in KITTI format
  save_mapped_txt: true                     # Save final corrected path in TUM format
  mapped_txt_path: ""                       # empty means <package>/result/mapped.txt
  match_mapped_txt_baseline_length: true    # if true, resample mapped.txt to baseline line count
  mapped_txt_baseline_path: "/root/dataset/loop3_garliosam_path.txt"  # baseline .txt path used for line count matching
  auto_save_on_idle: true                   # Auto shutdown and save when input stops (rosbag finished)
  bag_end_timeout_sec: 30.0                 # Consider bag finished after this many seconds without odom/pcd input
  seq_name: "sequence"                      # sequence name for saving scans and corresponding poses
